<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Recharge - Custom Flow</title>
    <style>
        :root { --tiktok-red: #fe2c55; --coin-gold: #face15; --text-gray: #8a8b91; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 15px; background: #fff; color: #161823; }
        
        .nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; }
        .nav-title { font-size: 17px; font-weight: 700; }

        /* Actual TikTok Coin Style */
        .tk-coin { width: 16px; height: 16px; vertical-align: middle; margin-right: 4px; }

        .user-box { margin-bottom: 20px; }
        .user-input { width: 100%; padding: 12px; border: 1px solid #ebebeb; border-radius: 4px; background: #f8f8f8; box-sizing: border-box; font-size: 15px; outline: none; }

        .promo-red { color: var(--tiktok-red); font-size: 12px; margin-bottom: 15px; font-weight: 600; }

        /* Grid */
        .coin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .coin-card { border: 1px solid #ebebeb; border-radius: 8px; padding: 14px 4px; text-align: center; cursor: pointer; background: #fff; }
        .coin-card.active { border: 1.5px solid var(--tiktok-red); background: #fff1f3; }
        .coin-val { font-weight: 700; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .coin-price { color: var(--text-gray); font-size: 11px; }

        /* Footer & Payments */
        .footer { margin-top: 30px; text-align: center; border-top: 1px solid #f1f1f2; padding-top: 20px; }
        .pay-methods { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .pay-methods img { height: 20px; filter: grayscale(1); opacity: 0.6; }
        
        .buy-btn { width: 100%; background: var(--tiktok-red); color: white; border: none; padding: 16px; border-radius: 2px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* POPUP STYLES */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
        .modal { background: white; padding: 25px; border-radius: 12px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal h3 { margin: 0 0 10px 0; font-size: 18px; }
        .modal input { width: 100%; padding: 15px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 24px; font-weight: bold; outline: none; color: var(--tiktok-red); }
        .modal-btn { background: var(--tiktok-red); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav">
        <span style="font-size: 24px;">✕</span>
        <span class="nav-title">Get Coins</span>
        <span style="font-size: 20px;">⋮</span>
    </div>

    <div class="user-box">
        <input type="text" id="userInput" class="user-input" placeholder="Enter username">
    </div>

    <div class="promo-red">Save around 25% with a lower third-party service fee. ⓘ</div>

    <div class="coin-grid" id="grid">
        <div class="coin-card active" onclick="selectCard(this, 30, 0.31)">
            <div class="coin-val">🪙 30</div>
            <div class="coin-price">$0.31</div>
        </div>
        <div class="coin-card" onclick="selectCard(this, 350, 3.65)">
            <div class="coin-val">🪙 350</div>
            <div class="coin-price">$3.65</div>
        </div>
        <div class="coin-card" onclick="selectCard(this, 700, 7.25)">
            <div class="coin-val">🪙 700</div>
            <div class="coin-price">$7.25</div>
        </div>
        <div class="coin-card" onclick="selectCard(this, 1400, 14.49)">
            <div class="coin-val">🪙 1400</div>
            <div class="coin-price">$14.49</div>
        </div>
        <div class="coin-card" onclick="selectCard(this, 3500, 36.20)">
            <div class="coin-val">🪙 3500</div>
            <div class="coin-price">$36.20</div>
        </div>
        <div class="coin-card" id="customBtn" onclick="openPopup()">
            <div class="coin-val" style="margin-top: 8px; font-size: 14px; color: #555;">Custom</div>
        </div>
    </div>

    <div class="footer">
        <div class="pay-methods">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/f2/Google_Pay_Logo.svg" alt="GPay">
        </div>
        <button id="buyBtn" class="buy-btn" onclick="finalize()">Buy for $0.31</button>
    </div>

    <div class="overlay" id="popup">
        <div class="modal">
            <div style="font-size: 40px; margin-bottom: 10px;">🪙</div>
            <h3>Enter Coin Amount</h3>
            <p style="font-size: 12px; color: gray;">Min. 100 coins</p>
            <input type="number" id="customAmountInput" placeholder="0">
            <button class="modal-btn" onclick="applyCustom()">Apply & Send</button>
            <p style="margin-top: 15px; font-size: 13px; color: gray; cursor: pointer;" onclick="closePopup()">Cancel</p>
        </div>
    </div>

    <script>
        let currentPrice = 0.31;
        let currentCoins = 30;

        function selectCard(el, amt, price) {
            document.querySelectorAll('.coin-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentPrice = price;
            currentCoins = amt;
            document.getElementById('buyBtn').innerText = `Buy for $${price.toFixed(2)}`;
        }

        function openPopup() {
            document.getElementById('popup').style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('popup').style.display = 'none';
        }

        function applyCustom() {
            const val = document.getElementById('customAmountInput').value;
            if(val >= 100) {
                currentCoins = val;
                // Simple math: approx $0.0104 per coin
                currentPrice = val * 0.0104; 
                
                document.querySelectorAll('.coin-card').forEach(c => c.classList.remove('active'));
                document.getElementById('customBtn').classList.add('active');
                document.getElementById('buyBtn').innerText = `Buy for $${currentPrice.toFixed(2)}`;
                
                closePopup();
            } else {
                alert("Please enter at least 100 coins.");
            }
        }

        function finalize() {
            const user = document.getElementById('userInput').value;
            if(!user) return alert("Please enter a username first.");
            alert(`Confirmed! Sending ${currentCoins} coins to @${user}. Opening Payment Gateway...`);
        }
    </script>
</body>
</html>
