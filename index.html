<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Recharge</title>
    <style>
        :root { --tiktok-red: #fe2c55; --coin-gold: #face15; --text-gray: #8a8b91; --soft-bg: #f8f8f8; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 15px; background: #fff; color: #161823; overflow-x: hidden; }
        
        /* Nav Header */
        .nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; }
        .nav-title { font-size: 17px; font-weight: 700; }
        .close-btn { font-size: 24px; cursor: pointer; color: #161823; }

        /* Real TikTok Coin SVG */
        .tk-coin { width: 16px; height: 16px; vertical-align: middle; margin-right: 4px; }

        /* Top Balance Header (from image 3164) */
        .balance-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding: 5px 0; }
        .tk-avatar { width: 40px; height: 40px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .balance-info b { font-size: 15px; display: block; }
        .balance-info span { font-size: 13px; color: var(--text-gray); display: flex; align-items: center; }

        /* Input Area */
        .user-box { position: relative; margin-bottom: 20px; }
        .user-input { width: 100%; padding: 12px 15px; border: 1px solid #ebebeb; border-radius: 4px; background: var(--soft-bg); box-sizing: border-box; font-size: 15px; outline: none; }

        /* Recharge Labels */
        .section-label { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: #555; }
        .promo-red { color: var(--tiktok-red); font-size: 12px; margin-bottom: 15px; font-weight: 600; }

        /* Grid */
        .coin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .coin-card { border: 1px solid #ebebeb; border-radius: 8px; padding: 14px 4px; text-align: center; cursor: pointer; transition: 0.2s; background: #fff; }
        .coin-card.active { border: 1.5px solid var(--tiktok-red); background: #fff1f3; }
        .coin-val { font-weight: 700; font-size: 16px; margin-bottom: 2px; display: flex; align-items: center; justify-content: center; }
        .coin-price { color: var(--text-gray); font-size: 11px; }

        /* Menu Rows */
        .row { display: flex; align-items: center; padding: 16px 0; border-top: 1px solid #f1f1f2; cursor: pointer; }
        .row-icon { font-size: 20px; margin-right: 12px; }
        .row-content { flex: 1; }
        .row-title { font-size: 14px; font-weight: 600; }
        .row-sub { font-size: 11px; color: var(--text-gray); }

        /* Footer Buy Section */
        .footer { margin-top: auto; padding-top: 20px; text-align: center; }
        .special-offer { font-size: 12px; color: var(--text-gray); margin-bottom: 15px; text-align: left; }
        .payment-img { width: 100%; max-width: 250px; margin-bottom: 15px; opacity: 0.8; }
        .buy-btn { width: 100%; background: var(--tiktok-red); color: white; border: none; padding: 16px; border-radius: 2px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Custom Popup */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
        .modal { background: white; padding: 25px; border-radius: 12px; width: 85%; max-width: 320px; text-align: center; }
        .modal input { width: 100%; padding: 15px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav">
        <span class="close-btn">✕</span>
        <span class="nav-title">Get Coins</span>
        <span style="font-size: 20px;">⋮</span>
    </div>

    <div class="balance-header">
        <div class="tk-avatar">👤</div>
        <div class="balance-info">
            <b>Recharge</b>
            <span>
                <svg class="tk-coin" viewBox="0 0 50 50"><circle cx="25" cy="25" r="23" fill="#face15"/><text x="50%" y="50%" text-anchor="middle" fill="#fff" font-weight="bold" font-size="28px" dy=".3em">d</text></svg>
                5,003,500
            </span>
        </div>
    </div>

    <div class="user-box">
        <input type="text" id="userInput" class="user-input" placeholder="Enter username">
    </div>

    <div class="section-label">Recharge</div>
    <div class="promo-red">Save around 25% with a lower third-party service fee. ⓘ</div>

    <div class="coin-grid">
        <div class="coin-card active" onclick="sel(this, 30, 0.31)">
            <div class="coin-val">
                <svg class="tk-coin" viewBox="0 0 50 50"><circle cx="25" cy="25" r="23" fill="#face15"/><text x="50%" y="50%" text-anchor="middle" fill="#fff" font-weight="bold" font-size="28px" dy=".3em">d</text></svg>
                30
            </div>
            <div class="coin-price">$0.31</div>
        </div>
        <div class="coin-card" onclick="sel(this, 350, 3.65)">
            <div class="coin-val">
                <svg class="tk-coin" viewBox="0 0 50 50"><circle cx="25" cy="25" r="23" fill="#face15"/><text x="50%" y="50%" text-anchor="middle" fill="#fff" font-weight="bold" font-size="28px" dy=".3em">d</text></svg>
                350
            </div>
            <div class="coin-price">$3.65</div>
        </div>
        <div class="coin-card" onclick="sel(this, 700, 7.25)">
            <div class="coin-val">
                <svg class="tk-coin" viewBox="0 0 50 50"><circle cx="25" cy="25" r="23" fill="#face15"/><text x="50%" y="50%" text-anchor="middle" fill="#fff" font-weight="bold" font-size="28px" dy=".3em">d</text></svg>
                700
            </div>
            <div class="coin-price">$7.25</div>
        </div>
        <div class="coin-card" onclick="sel(this, 1400, 14.49)">
            <div class="coin-val">
                <svg class="tk-coin" viewBox="0 0 50 50"><circle cx="25" cy="25" r="23" fill="#face15"/><text x="50%" y="50%" text-anchor="middle" fill="#fff" font-weight="bold" font-size="28px" dy=".3em">d</text></svg>
                1400
            </div>
            <div class="coin-price">$14.49</div>
        </div>
        <div class="coin-card" onclick="sel(this, 3500, 36.20)">
            <div class="coin-val">
                <svg class="tk-coin" viewBox="0 0 50 50"><circle cx="25" cy="25" r="23" fill="#face15"/><text x="50%" y="50%" text-anchor="middle" fill="#fff" font-weight="bold" font-size="28px" dy=".3em">d</text></svg>
                3500
            </div>
            <div class="coin-price">$36.20</div>
        </div>
        <div class="coin-card" onclick="openModal()">
            <div class="coin-val" style="margin-top: 8px; font-size: 14px;">Custom</div>
        </div>
    </div>

    <div class="row">
        <span class="row-icon">🎁</span>
        <div class="row-content">
            <div class="row-title">Invite & Get Rewards</div>
            <div class="row-sub">Check out this new feature!</div>
        </div>
        <span style="color:#ccc">›</span>
    </div>

    <div class="footer">
        <div class="special-offer">Special offer <span style="color:#ccc">ⓘ</span> <span style="float:right; color:var(--tiktok-red)">Unlock 5% cash back ›</span></div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" class="payment-img" style="height:20px; width:auto; margin-bottom:20px;" alt="Payments">
        <button id="buyBtn" class="buy-btn" onclick="finish()">Buy for $0.31</button>
    </div>

    <div class="overlay" id="modal">
        <div class="modal">
            <svg class="tk-coin" style="width:40px; height:40px;" viewBox="0 0 50 50"><circle cx="25" cy="25" r="23" fill="#face15"/><text x="50%" y="50%" text-anchor="middle" fill="#fff" font-weight="bold" font-size="28px" dy=".3em">d</text></svg>
            <h3>Custom Amount</h3>
            <input type="number" id="customIn" placeholder="0">
            <button class="buy-btn" onclick="applyCustom()">Confirm</button>
            <p style="color:gray; font-size:13px; margin-top:15px; cursor:pointer;" onclick="closeModal()">Cancel</p>
        </div>
    </div>

    <script>
        let currentPrice = 0.31;

        function sel(el, amt, price) {
            document.querySelectorAll('.coin-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentPrice = price;
            document.getElementById('buyBtn').innerText = `Buy for $${price.toFixed(2)}`;
        }

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function applyCustom() {
            let val = document.getElementById('customIn').value;
            if(val > 0) {
                currentPrice = val * 0.0105; 
                document.getElementById('buyBtn').innerText = `Buy for $${currentPrice.toFixed(2)}`;
                closeModal();
            }
        }

        function finish() {
            let user = document.getElementById('userInput').value;
            if(!user) return alert("Please enter username");
            alert("Redirecting to secure payment for @" + user);
        }
    </script>
</body>
</html>
