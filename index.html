<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok - Get Coins</title>
    <style>
        :root {
            --tiktok-red: #fe2c55;
            --border-gray: #ebebeb;
            --text-black: #161823;
            --text-gray: #8a8b91;
        }

        body {
            font-family: 'SofiaPro', sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            padding: 15px;
            color: var(--text-black);
        }

        /* Header Navigation */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }
        .header h1 { font-size: 17px; margin: 0; font-weight: 700; }
        .icon-btn { font-size: 20px; cursor: pointer; }

        /* Username Input */
        .user-input-container {
            position: relative;
            margin-bottom: 25px;
        }
        .user-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            background: url('https://img.icons8.com/ios-filled/50/000000/user-male-circle.png') no-repeat center;
            background-size: contain;
            opacity: 0.8;
        }
        .username-input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1px solid var(--border-gray);
            border-radius: 4px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #f8f8f8;
        }

        /* Recharge Section */
        .recharge-title { font-weight: 700; font-size: 14px; margin-bottom: 5px; }
        .recharge-promo { 
            color: var(--tiktok-red); 
            font-size: 12px; 
            margin-bottom: 15px; 
            display: block; 
        }

        /* Grid */
        .coin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .coin-card {
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .coin-card:hover { border-color: var(--tiktok-red); background-color: #fff1f3; }
        .coin-card.active { border: 1.5px solid var(--tiktok-red); background-color: #fff1f3; }

        .coin-amount { font-weight: 700; font-size: 15px; display: flex; align-items: center; justify-content: center; }
        .coin-icon { color: #f9a825; margin-right: 4px; font-size: 14px; }
        .coin-price { color: var(--text-gray); font-size: 12px; margin-top: 2px; }

        /* Menu Items */
        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-top: 1px solid #f1f1f2;
            cursor: pointer;
        }
        .menu-icon { font-size: 20px; margin-right: 15px; }
        .menu-text { flex: 1; }
        .menu-title { font-size: 14px; font-weight: 600; }
        .menu-sub { font-size: 12px; color: var(--text-gray); margin-top: 2px; }
        .arrow { color: #ccc; font-size: 18px; }

        /* Popups */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        .modal input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
        }
        .confirm-btn {
            background: var(--tiktok-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <span class="icon-btn">✕</span>
        <h1>Get Coins</h1>
        <span class="icon-btn">⋮</span>
    </div>

    <div class="user-input-container">
        <div class="user-icon"></div>
        <input type="text" id="targetUser" class="username-input" placeholder="Enter username">
    </div>

    <div class="recharge-section">
        <span class="recharge-title">Recharge</span>
        <span class="recharge-promo">Save around 25% with a lower third-party service fee. ⓘ</span>

        <div class="coin-grid">
            <div class="coin-card" onclick="selectCard(this, 30)">
                <div class="coin-amount"><span class="coin-icon">●</span>30</div>
                <div class="coin-price">$0.31</div>
            </div>
            <div class="coin-card" onclick="selectCard(this, 350)">
                <div class="coin-amount"><span class="coin-icon">●</span>350</div>
                <div class="coin-price">$3.65</div>
            </div>
            <div class="coin-card" onclick="selectCard(this, 700)">
                <div class="coin-amount"><span class="coin-icon">●</span>700</div>
                <div class="coin-price">$7.25</div>
            </div>
            <div class="coin-card" onclick="selectCard(this, 1400)">
                <div class="coin-amount"><span class="coin-icon">●</span>1400</div>
                <div class="coin-price">$14.49</div>
            </div>
            <div class="coin-card" onclick="selectCard(this, 3500)">
                <div class="coin-amount"><span class="coin-icon">●</span>3500</div>
                <div class="coin-price">$36.2</div>
            </div>
            <div class="coin-card" onclick="showPopup('customPopup')">
                <div class="coin-amount" style="margin-top: 8px;">Custom</div>
            </div>
        </div>
    </div>

    <div class="menu-item">
        <span class="menu-icon">🎁</span>
        <div class="menu-text">
            <div class="menu-title">Invite & Get Rewards</div>
            <div class="menu-sub">Check out this new feature!</div>
        </div>
        <span class="arrow">›</span>
    </div>

    <div class="menu-item" style="border-bottom: 1px solid #f1f1f2;">
        <span class="menu-icon">📱</span>
        <div class="menu-text">
            <div class="menu-title">Add this page to mobile desktop</div>
            <div class="menu-sub">For easy access with just one click</div>
        </div>
        <span class="arrow">›</span>
    </div>

    <button class="confirm-btn" style="margin-top: 30px; padding: 15px;" onclick="validateAndSend()">Send Coins</button>
</div>

<div class="overlay" id="customPopup">
    <div class="modal">
        <h3>Custom Amount</h3>
        <input type="number" id="customValue" placeholder="How many coins?">
        <button class="confirm-btn" onclick="applyCustom()">Apply</button>
        <p style="font-size: 12px; color: grey; margin-top: 10px; cursor: pointer;" onclick="hidePopup('customPopup')">Cancel</p>
    </div>
</div>

<script>
    let selectedAmount = 0;

    function selectCard(el, amt) {
        document.querySelectorAll('.coin-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        selectedAmount = amt;
    }

    function showPopup(id) {
        document.getElementById(id).style.display = 'flex';
    }

    function hidePopup(id) {
        document.getElementById(id).style.display = 'none';
    }

    function applyCustom() {
        let val = document.getElementById('customValue').value;
        if(val > 0) {
            selectedAmount = val;
            alert("Custom amount set to " + val);
            hidePopup('customPopup');
        }
    }

    function validateAndSend() {
        let user = document.getElementById('targetUser').value;
        if(!user) {
            alert("Please enter a username!");
            return;
        }
        if(selectedAmount === 0) {
            alert("Please select a coin amount!");
            return;
        }
        alert("Sending " + selectedAmount + " coins to " + user);
    }
</script>

</body>
</html>
